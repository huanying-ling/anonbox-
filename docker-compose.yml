version: '3.8'

services:
  anonbox:
    build: .
    container_name: anonbox
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/app/data/data.db
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-random-string}
      - NODE_ENV=production
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-admin123}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
